<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Party Queen</title>

<style>

body{
    margin:0;
    padding:20px;
    text-align:center;
    font-family:Arial,sans-serif;
    background:#fff5fa;
    overflow:hidden;
}

h1{
    color:#ff1493;
    margin-top:20px;
}

/* Crown */

#crown{
    font-size:120px;
    animation:drop 2s ease;
}

@keyframes drop{
    from{
        transform:translateY(-300px);
    }

    to{
        transform:translateY(0);
    }
}

/* Message Card */

.card{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

/* Balloons */

.balloon{
    position:fixed;
    bottom:-100px;
    font-size:40px;
    animation:fly 10s linear infinite;
}

.b1{left:10%;}
.b2{left:40%;animation-delay:2s;}
.b3{left:70%;animation-delay:4s;}
.b4{left:90%;animation-delay:1s;}

@keyframes fly{
    from{
        bottom:-100px;
    }

    to{
        bottom:120%;
    }
}

/* Hearts */

.heart{
    position:fixed;
    font-size:28px;
    animation:float 8s linear infinite;
}

.h1{left:20%;}
.h2{left:50%;animation-delay:2s;}
.h3{left:80%;animation-delay:4s;}

@keyframes float{
    from{
        top:100%;
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        top:-100px;
        opacity:0;
    }
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff1493;
    color:white;
    font-size:18px;
    margin:10px;
}

#confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
}

</style>
</head>
<body>

<div class="balloon b1">🎈</div>
<div class="balloon b2">🎈</div>
<div class="balloon b3">🎈</div>
<div class="balloon b4">🎈</div>

<div class="heart h1">💖</div>
<div class="heart h2">💕</div>
<div class="heart h3">💗</div>

<h1>👑 Party Queen 👑</h1>

<div id="crown">👑</div>

<div class="card">

<h2>🏆 Royal Celebration</h2>

<p id="message"></p>

</div>

<button onclick="startConfetti()">
🎉 Grand Celebration
</button>

<button onclick="window.location.href='index.html'">
⬅ Back
</button>

<div id="confetti"></div>

<script>

/* Typewriter */

const text =
"Congratulations! Today is your royal celebration. May your day be filled with laughter, happiness, wonderful memories and endless smiles. Long live the Party Queen! 👑✨";

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("message").innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter,50);
    }
}

typeWriter();

/* Confetti */

function startConfetti(){

    const box = document.getElementById("confetti");

    for(let i=0;i<80;i++){

        let conf = document.createElement("div");

        conf.innerHTML = ["🎉","✨","🎊","💖"][Math.floor(Math.random()*4)];

        conf.style.position = "absolute";
        conf.style.left = Math.random()*100 + "%";
        conf.style.top = "-50px";
        conf.style.fontSize = "25px";

        conf.style.animation =
        "fall " + (Math.random()*3+2) + "s linear";

        box.appendChild(conf);

        setTimeout(()=>{
            conf.remove();
        },5000);
    }
}

const style = document.createElement("style");

style.innerHTML = `
@keyframes fall{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(110vh);
    }
}
`;

document.head.appendChild(style);

</script>

</body>
</html>
