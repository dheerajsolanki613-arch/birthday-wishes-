<!DOCTYPE html>
<html>
<head>
<title>Birthday Letter</title>

<style>
body{
    background:linear-gradient(pink,#ffb6c1);
    text-align:center;
    font-family:Arial;
    padding:40px;
}

.letter{
    background:white;
    max-width:500px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff1493;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff1493;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="letter">

<h1>💌 Happy Birthday Manvi 💌</h1>

<p>
Dear Manvi,
<br><br>
Wishing you a wonderful 15th birthday filled with happiness,
success, laughter and beautiful memories.
<br><br>
May all your dreams come true and may your life always be filled
with joy and love.
<br><br>
🎂 Happy Birthday 🎂
</p>

<button onclick="history.back()">
⬅ Back
</button>

</div>

</body>
</html>
