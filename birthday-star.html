<!DOCTYPE html>
<html>
<head>
<title>Birthday Star</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial;
    background:linear-gradient(
    135deg,
    #ff9ad5,
    #ffd6f5,
    #fff0f8
    );
}

.star-card{
    width:90%;
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 0 30px rgba(255,105,180,.4);
}

.star{
    font-size:120px;
    animation:spin 4s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

h1{
    color:#ff1493;
}

.reward{
    margin-top:20px;
    padding:20px;
    background:#fff0f7;
    border-radius:20px;
}

.reward img{
    width:250px;
    max-width:90%;
}

.back-btn{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    color:white;
    background:linear-gradient(
    45deg,
    #ff69b4,
    #ff1493
    );
}
</style>

</head>
<body>

<div class="star-card">

<div class="star">⭐</div>

<h1>Birthday Star Award</h1>

<p>
Congratulations! 🎉
You unlocked the Birthday Star Badge.
</p>

<div class="reward">

<h2>🌟 Special Reward 🌟</h2>

<p>
Manvi is the shining star of today!
</p>

<img src="tulip-bouquet.png">

</div>

<button class="back-btn"
onclick="location.href='index.html'">
🏠 Back Home
</button>

</div>

</body>
</html>
