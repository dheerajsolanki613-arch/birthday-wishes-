<!DOCTYPE html>
<html>
<head>
<title>Special Gift For Manvi</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff9ad5,#ffd6f5,#ffe6b3);
    min-height:100vh;
    overflow-x:hidden;
}

h1{
    color:#ff1493;
    margin-top:30px;
    text-shadow:0 0 10px white;
}

.gift-box{
    font-size:150px;
    cursor:pointer;
    animation:float 2s ease-in-out infinite;
    transition:.3s;
}

.gift-box:hover{
    transform:scale(1.1);
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

.tap-text{
    font-size:22px;
    color:#444;
}

#reward{
    display:none;
    margin-top:30px;
    animation:popup .8s ease;
}

@keyframes popup{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.reward-card{
    background:white;
    width:90%;
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,105,180,.5);
}

.reward-card img{
    width:280px;
    max-width:90%;
    border-radius:20px;
    transition:.4s;
}

.reward-card img:hover{
    transform:scale(1.05);
}

.reward-title{
    color:#ff1493;
    font-size:30px;
}

.reward-text{
    font-size:20px;
    color:#444;
}

.back-btn{
    margin-top:25px;
    padding:12px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff1493,#ff69b4);
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,20,147,.5);
}

.back-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>🎁 Special Gift For Manvi 🎁</h1>

<div class="gift-box" onclick="openGift()">
🎁
</div>

<p class="tap-text">
Tap The Gift To Reveal Your Surprise ✨
</p>

<div id="reward">

<div class="reward-card">

<h2 class="reward-title">
💖 Congratulations 💖
</h2>

<img src="chocolate-basket.png">

<p class="reward-text">
🍫 A Luxury Chocolate Basket For Manvi 🍫
</p>

<p>
🌹 Wishing You Happiness, Success, Love And Sweet Memories 🌹
</p>

</div>

</div>

<br>

<button class="back-btn" onclick="history.back()">
⬅ Back
</button>

<script>
function openGift(){

document.querySelector(".gift-box").style.display="none";

document.getElementById("reward").style.display="block";

}
</script>

</body>
</html>
